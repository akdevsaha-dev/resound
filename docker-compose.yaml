services:
  db:
    image: postgres:15
    container_name: resound-db
    restart: always
    environment:
      POSTGRES_USER: resound
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: resound
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: node:20-alpine
    container_name: resound-app
    working_dir: /app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"

volumes:
  pgdata:
